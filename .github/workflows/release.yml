name: Release

on:
  # 因 GitHub Actions 账户欠费暂不可用，本地发版详见 docs/release-process.md
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: uv-${{ runner.os }}-py3.13-${{ hashFiles('uv.lock') }}

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Build exe
        run: bash scripts/build/build.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/winrandr.exe
          body: |
            详见 [CHANGELOG](https://github.com/SMWHff/winrandr/blob/main/docs/CHANGELOG.md) 和 [发版流程](https://github.com/SMWHff/winrandr/blob/main/docs/release-process.md)。
