name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python pin ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint — verify imports
        run: uv run python -c "import winrandr; print('OK', winrandr.__version__)"

      - name: Test — CLI help
        run: uv run python -m winrandr --help

      - name: Test — version
        run: uv run python -m winrandr --version

      - name: Test — pytest
        run: uv run pytest tests/ -v
