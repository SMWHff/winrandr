name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev --python ${{ matrix.python-version }}

      - name: Lint — verify imports
        run: uv run --python ${{ matrix.python-version }} python -c "import winrandr; print('OK', winrandr.__version__)"

      - name: Test — CLI help
        run: uv run --python ${{ matrix.python-version }} python -m winrandr --help

      - name: Test — version
        run: uv run --python ${{ matrix.python-version }} python -m winrandr --version

      - name: Test — pytest
        run: uv run --python ${{ matrix.python-version }} pytest tests/ -v
